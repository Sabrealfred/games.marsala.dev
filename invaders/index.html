<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPACE INVADERS - Marsala Arcade</title>
<style>
  @font-face { font-family: 'Pixel'; src: local('Courier New'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; overflow: hidden; font-family: 'Courier New', monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; width: 100vw; touch-action: none; user-select: none;
  }
  #back-link {
    position: fixed; top: 12px; left: 16px; z-index: 100;
    color: #0f0; font-family: 'Courier New', monospace; font-size: 14px;
    text-decoration: none; opacity: 0.7; transition: opacity 0.2s;
  }
  #back-link:hover { opacity: 1; text-decoration: underline; }
  #game-wrap {
    position: relative; max-width: 800px; width: 100%; aspect-ratio: 4/3;
  }
  canvas {
    width: 100%; height: 100%; display: block; image-rendering: pixelated;
    border: 2px solid #333; border-radius: 4px;
  }
  #scanlines {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10; border-radius: 4px;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px
    );
  }
  #crt-glow {
    position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
    pointer-events: none; z-index: 9; border-radius: 8px;
    box-shadow: inset 0 0 80px rgba(0,255,0,0.04), 0 0 20px rgba(0,255,0,0.06);
  }
  #touch-controls {
    display: none; position: fixed; bottom: 16px; left: 0; right: 0;
    justify-content: space-between; padding: 0 20px; z-index: 50;
  }
  .touch-btn {
    width: 72px; height: 72px; border-radius: 50%; border: 2px solid rgba(0,255,0,0.5);
    background: rgba(0,255,0,0.1); color: #0f0; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; -webkit-tap-highlight-color: transparent;
  }
  .touch-btn:active { background: rgba(0,255,0,0.3); }
  #touch-fire { width: 88px; height: 88px; font-size: 14px; letter-spacing: 1px; }
  @media (pointer: coarse) { #touch-controls { display: flex; } }
  @media (max-width: 600px) {
    #game-wrap { max-width: 100vw; aspect-ratio: auto; height: calc(100vh - 120px); }
    #back-link { font-size: 11px; top: 4px; left: 8px; }
  }
</style>
</head>
<body>
<a id="back-link" href="https://games.marsala.dev/">&larr; Back to Arcade</a>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="scanlines"></div>
  <div id="crt-glow"></div>
</div>
<div id="touch-controls">
  <div class="touch-btn" id="touch-left">&larr;</div>
  <div class="touch-btn" id="touch-right">&rarr;</div>
  <div class="touch-btn" id="touch-fire">FIRE</div>
</div>
<script>
// ============================================================
//  SPACE INVADERS - Premium Arcade Edition
//  Marsala Games (c) 2026 - Single file, zero dependencies
// ============================================================
(() => {
"use strict";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// --- Constants ---
const PLAYER_W = 40, PLAYER_H = 24, PLAYER_Y = H - 50;
const BULLET_W = 3, BULLET_H = 12, BULLET_SPEED = 7;
const ALIEN_ROWS = 5, ALIEN_COLS = 11;
const ALIEN_W = 32, ALIEN_H = 24, ALIEN_PAD = 14;
const SHIELD_COUNT = 4, SHIELD_W = 60, SHIELD_H = 40;
const UFO_W = 48, UFO_H = 20;

// --- State ---
let state = 'title'; // title, playing, paused, gameover, intermission, dying
let score = 0, highScore = parseInt(localStorage.getItem('si_hi') || '0');
let lives = 3, wave = 1, combo = 0, maxCombo = 0;
let shakeTimer = 0, shakeX = 0, shakeY = 0;
let intermissionTimer = 0, dyingTimer = 0;
let attractTimer = 0, insertCoinBlink = 0;
let lastTime = 0, dt = 0, frameCount = 0;

// --- Input ---
const keys = {};
let touchLeft = false, touchRight = false, touchFire = false;
let swipeStartX = 0, swipeActive = false;

// --- Audio Engine (Web Audio API) ---
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type = 'square', vol = 0.12, slide = 0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sndShoot() { playTone(880, 0.1, 'square', 0.1, -400); }
function sndExplosion() {
  playTone(120, 0.3, 'sawtooth', 0.15, -80);
  playTone(80, 0.4, 'square', 0.08, -40);
}
function sndPlayerDeath() {
  playTone(440, 0.15, 'sawtooth', 0.2, -300);
  setTimeout(() => playTone(220, 0.2, 'sawtooth', 0.15, -150), 150);
  setTimeout(() => playTone(110, 0.4, 'sawtooth', 0.12, -80), 350);
}
function sndUfo() { playTone(400, 0.08, 'sine', 0.06, 200); }
let marchSndIndex = 0;
const marchFreqs = [80, 70, 60, 50];
function sndMarch() {
  playTone(marchFreqs[marchSndIndex % 4], 0.08, 'square', 0.1);
  marchSndIndex++;
}
function sndLevelComplete() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'square', 0.1), i * 120));
}
function sndGameOver() {
  const notes = [392, 349, 330, 262];
  notes.forEach((f, i) => setTimeout(() => playTone(f, 0.25, 'sawtooth', 0.12), i * 250));
}

// --- Stars (parallax) ---
const starLayers = [[], [], []];
const starSpeeds = [0.15, 0.4, 0.8];
const starSizes = [1, 1.3, 1.8];
function initStars() {
  for (let l = 0; l < 3; l++) {
    starLayers[l] = [];
    const count = [80, 50, 25][l];
    for (let i = 0; i < count; i++) {
      starLayers[l].push({ x: Math.random() * W, y: Math.random() * H, b: 0.3 + Math.random() * 0.7 });
    }
  }
}
function drawStars() {
  for (let l = 0; l < 3; l++) {
    const s = starSizes[l];
    for (const star of starLayers[l]) {
      star.y += starSpeeds[l];
      if (star.y > H) { star.y = 0; star.x = Math.random() * W; }
      const alpha = star.b * (0.5 + 0.5 * Math.sin(frameCount * 0.02 + star.x));
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillRect(star.x, star.y, s, s);
    }
  }
}

// --- Particles ---
let particles = [];
function spawnParticles(x, y, color, count = 16, speed = 3) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.5;
    const spd = speed * (0.5 + Math.random());
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, decay: 0.015 + Math.random() * 0.02, size: 2 + Math.random() * 3, color
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.vx *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size * p.life, p.size * p.life);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// --- Player ---
let player = { x: W / 2, speed: 5 };
let playerBullets = [];
let shootCooldown = 0;
let playerInvincible = 0;

function drawPlayer(px, py, glow = true) {
  if (playerInvincible > 0 && Math.floor(playerInvincible * 10) % 2 === 0) return;
  ctx.save();
  if (glow) { ctx.shadowColor = '#0f0'; ctx.shadowBlur = 12; }
  // Ship body
  ctx.fillStyle = '#0c0';
  ctx.beginPath();
  ctx.moveTo(px, py - PLAYER_H / 2);
  ctx.lineTo(px - PLAYER_W / 2, py + PLAYER_H / 2);
  ctx.lineTo(px - PLAYER_W / 4, py + PLAYER_H / 4);
  ctx.lineTo(px + PLAYER_W / 4, py + PLAYER_H / 4);
  ctx.lineTo(px + PLAYER_W / 2, py + PLAYER_H / 2);
  ctx.closePath();
  ctx.fill();
  // Cockpit
  ctx.fillStyle = '#5f5';
  ctx.fillRect(px - 3, py - PLAYER_H / 2 + 4, 6, 6);
  // Engine glow
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur = 10;
  const flicker = 0.6 + 0.4 * Math.sin(frameCount * 0.3);
  ctx.fillStyle = `rgba(255,100,0,${flicker})`;
  ctx.fillRect(px - 6, py + PLAYER_H / 4, 4, 4 + Math.random() * 4);
  ctx.fillRect(px + 2, py + PLAYER_H / 4, 4, 4 + Math.random() * 4);
  ctx.restore();
}

// --- Aliens ---
let aliens = [];
let alienDir = 1, alienSpeed = 1, alienDropCounter = 0;
let alienBullets = [];
let alienMarchTimer = 0, alienMarchInterval = 0.5;
let animFrame = 0, animTimer = 0;

function createAliens() {
  aliens = [];
  for (let r = 0; r < ALIEN_ROWS; r++) {
    for (let c = 0; c < ALIEN_COLS; c++) {
      const type = r === 0 ? 2 : r < 3 ? 1 : 0;
      aliens.push({
        x: 80 + c * (ALIEN_W + ALIEN_PAD),
        y: 60 + r * (ALIEN_H + ALIEN_PAD),
        type, alive: true, deathTimer: 0
      });
    }
  }
  alienDir = 1; alienSpeed = 1 + (wave - 1) * 0.3;
  alienMarchInterval = Math.max(0.12, 0.5 - (wave - 1) * 0.04);
  alienMarchTimer = 0;
}

function drawAlien(a, frame) {
  if (!a.alive) {
    if (a.deathTimer > 0) {
      ctx.globalAlpha = a.deathTimer;
      ctx.fillStyle = '#fff';
      ctx.font = '20px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('X', a.x + ALIEN_W / 2, a.y + ALIEN_H / 2 + 6);
      ctx.globalAlpha = 1;
    }
    return;
  }
  const cx = a.x + ALIEN_W / 2, cy = a.y + ALIEN_H / 2;
  ctx.save();
  const colors = ['#4f4', '#0ff', '#f0f'];
  const glowColors = ['#0f0', '#0ff', '#f0f'];
  ctx.shadowColor = glowColors[a.type];
  ctx.shadowBlur = 8;
  ctx.fillStyle = colors[a.type];

  if (a.type === 0) {
    // Squid type - legs wiggle
    ctx.fillRect(cx - 10, cy - 8, 20, 12);
    ctx.fillRect(cx - 6, cy - 12, 12, 4);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 6, cy - 6, 4, 4);
    ctx.fillRect(cx + 2, cy - 6, 4, 4);
    // Legs
    ctx.fillStyle = colors[a.type];
    if (frame === 0) {
      ctx.fillRect(cx - 12, cy + 4, 4, 6);
      ctx.fillRect(cx - 6, cy + 4, 4, 8);
      ctx.fillRect(cx + 2, cy + 4, 4, 8);
      ctx.fillRect(cx + 8, cy + 4, 4, 6);
    } else {
      ctx.fillRect(cx - 14, cy + 4, 4, 8);
      ctx.fillRect(cx - 6, cy + 4, 4, 6);
      ctx.fillRect(cx + 2, cy + 4, 4, 6);
      ctx.fillRect(cx + 10, cy + 4, 4, 8);
    }
  } else if (a.type === 1) {
    // Crab type - claws snap
    ctx.fillRect(cx - 8, cy - 10, 16, 14);
    ctx.fillRect(cx - 12, cy - 6, 24, 8);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 5, cy - 6, 3, 3);
    ctx.fillRect(cx + 2, cy - 6, 3, 3);
    // Claws
    ctx.fillStyle = colors[a.type];
    if (frame === 0) {
      ctx.fillRect(cx - 16, cy - 2, 4, 8);
      ctx.fillRect(cx + 12, cy - 2, 4, 8);
    } else {
      ctx.fillRect(cx - 16, cy - 6, 4, 8);
      ctx.fillRect(cx + 12, cy - 6, 4, 8);
    }
    // Antennae
    ctx.fillRect(cx - 4, cy + 6, 3, 4);
    ctx.fillRect(cx + 1, cy + 6, 3, 4);
  } else {
    // Octopus type - tentacles wave
    ctx.beginPath();
    ctx.arc(cx, cy - 4, 10, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(cx - 10, cy - 4, 20, 8);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 5, cy - 6, 3, 4);
    ctx.fillRect(cx + 2, cy - 6, 3, 4);
    // Tentacles
    ctx.fillStyle = colors[a.type];
    for (let t = -3; t <= 3; t++) {
      const tx = cx + t * 3;
      const ty = cy + 4 + (frame === 0 ? Math.abs(t) * 2 : (3 - Math.abs(t)) * 2);
      ctx.fillRect(tx, cy + 4, 2, ty - cy - 4 + 4);
    }
  }
  ctx.restore();
}

// --- UFO ---
let ufo = { active: false, x: 0, dir: 1, timer: 0, points: 0 };
let ufoScoreDisplay = { active: false, x: 0, timer: 0, points: 0 };

function drawUfo() {
  if (!ufo.active) return;
  ctx.save();
  ctx.shadowColor = '#f0f';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#d0d';
  // Body
  ctx.beginPath();
  ctx.ellipse(ufo.x, 30, UFO_W / 2, UFO_H / 2 - 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Dome
  ctx.fillStyle = '#f5f';
  ctx.beginPath();
  ctx.ellipse(ufo.x, 24, 14, 8, 0, Math.PI, 0);
  ctx.fill();
  // Lights
  const blink = Math.sin(frameCount * 0.2) > 0;
  ctx.fillStyle = blink ? '#ff0' : '#f80';
  for (let i = -2; i <= 2; i++) {
    ctx.fillRect(ufo.x + i * 8 - 1, 32, 3, 3);
  }
  ctx.restore();
}

// --- Shields ---
let shields = [];
function createShields() {
  shields = [];
  const shieldY = H - 120;
  for (let i = 0; i < SHIELD_COUNT; i++) {
    const sx = 120 + i * (W - 240) / (SHIELD_COUNT - 1) - SHIELD_W / 2;
    const pixels = [];
    for (let py = 0; py < SHIELD_H; py++) {
      for (let px = 0; px < SHIELD_W; px++) {
        // Arch shape
        const cx = SHIELD_W / 2, cy = SHIELD_H;
        const dx = px - cx, dy = py - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const inArch = dist < SHIELD_W / 1.6 && py < SHIELD_H - 4;
        // Cut out bottom center
        const inCutout = px > SHIELD_W / 2 - 10 && px < SHIELD_W / 2 + 10 && py > SHIELD_H - 16;
        if (inArch && !inCutout) {
          pixels.push({ x: px, y: py, alive: true });
        }
      }
    }
    shields.push({ x: sx, y: shieldY, pixels });
  }
}

function drawShields() {
  ctx.fillStyle = '#0c0';
  for (const s of shields) {
    for (const p of s.pixels) {
      if (p.alive) ctx.fillRect(s.x + p.x, s.y + p.y, 1, 1);
    }
  }
}

function damageShield(sx, sy, radius = 6) {
  for (const s of shields) {
    for (const p of s.pixels) {
      if (!p.alive) continue;
      const dx = (s.x + p.x) - sx, dy = (s.y + p.y) - sy;
      if (dx * dx + dy * dy < radius * radius) {
        p.alive = false;
      }
    }
  }
}

// --- Collision helpers ---
function rectOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// --- Game Logic ---
function resetGame() {
  score = 0; lives = 3; wave = 1; combo = 0; maxCombo = 0;
  player.x = W / 2;
  playerBullets = []; alienBullets = [];
  particles = [];
  ufo.active = false; ufo.timer = 0;
  playerInvincible = 0;
  createAliens(); createShields();
}

function startWave() {
  playerBullets = []; alienBullets = [];
  ufo.active = false; ufo.timer = 0;
  createAliens(); createShields();
}

function getAliveCount() { return aliens.filter(a => a.alive).length; }

function updatePlaying() {
  const moveLeft = keys['ArrowLeft'] || keys['a'] || touchLeft;
  const moveRight = keys['ArrowRight'] || keys['d'] || touchRight;
  const fire = keys[' '] || keys['ArrowUp'] || touchFire;

  // Player movement
  if (moveLeft) player.x -= player.speed;
  if (moveRight) player.x += player.speed;
  player.x = Math.max(PLAYER_W / 2 + 10, Math.min(W - PLAYER_W / 2 - 10, player.x));

  // Shooting
  if (shootCooldown > 0) shootCooldown -= dt;
  if (fire && shootCooldown <= 0 && playerBullets.length < 2) {
    playerBullets.push({ x: player.x - BULLET_W / 2, y: PLAYER_Y - PLAYER_H / 2 - BULLET_H });
    shootCooldown = 0.2;
    sndShoot();
  }

  // Player bullets
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    playerBullets[i].y -= BULLET_SPEED;
    if (playerBullets[i].y < -BULLET_H) {
      playerBullets.splice(i, 1);
      combo = 0; // miss resets combo
    }
  }

  // Alien march
  alienMarchTimer += dt;
  const aliveCount = getAliveCount();
  const speedMult = 1 + (ALIEN_ROWS * ALIEN_COLS - aliveCount) * 0.02;
  const currentInterval = alienMarchInterval / speedMult;

  if (alienMarchTimer >= currentInterval) {
    alienMarchTimer = 0;
    sndMarch();
    animFrame = 1 - animFrame;
    let shouldDrop = false;

    for (const a of aliens) {
      if (!a.alive) continue;
      if ((alienDir > 0 && a.x + ALIEN_W > W - 20) || (alienDir < 0 && a.x < 20)) {
        shouldDrop = true; break;
      }
    }

    if (shouldDrop) {
      alienDir *= -1;
      for (const a of aliens) {
        if (a.alive) a.y += 12;
      }
    }

    const step = (alienSpeed * speedMult) * alienDir * 8;
    for (const a of aliens) {
      if (a.alive) a.x += step;
    }

    // Alien shooting
    const shootChance = 0.03 + wave * 0.008;
    const bottomAliens = [];
    for (let c = 0; c < ALIEN_COLS; c++) {
      for (let r = ALIEN_ROWS - 1; r >= 0; r--) {
        const a = aliens[r * ALIEN_COLS + c];
        if (a && a.alive) { bottomAliens.push(a); break; }
      }
    }
    for (const a of bottomAliens) {
      if (Math.random() < shootChance && alienBullets.length < 5 + wave) {
        alienBullets.push({
          x: a.x + ALIEN_W / 2, y: a.y + ALIEN_H,
          speed: 3 + wave * 0.3 + Math.random()
        });
      }
    }
  }

  // Dead alien animation
  for (const a of aliens) {
    if (!a.alive && a.deathTimer > 0) a.deathTimer -= dt * 3;
  }

  // Alien bullets
  for (let i = alienBullets.length - 1; i >= 0; i--) {
    alienBullets[i].y += alienBullets[i].speed;
    if (alienBullets[i].y > H) { alienBullets.splice(i, 1); continue; }
    // Check shield collision
    const ab = alienBullets[i];
    if (!ab) continue;
    let hitShield = false;
    for (const s of shields) {
      for (const p of s.pixels) {
        if (p.alive && Math.abs(s.x + p.x - ab.x) < 3 && Math.abs(s.y + p.y - ab.y) < 4) {
          damageShield(ab.x, ab.y, 5);
          alienBullets.splice(i, 1);
          hitShield = true; break;
        }
      }
      if (hitShield) break;
    }
    if (hitShield) continue;
    // Check player collision
    if (ab && playerInvincible <= 0 &&
        rectOverlap(ab.x - 2, ab.y - 4, 4, 8, player.x - PLAYER_W / 2, PLAYER_Y - PLAYER_H / 2, PLAYER_W, PLAYER_H)) {
      alienBullets.splice(i, 1);
      playerHit();
    }
  }

  // Player bullets vs aliens
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    let hit = false;
    // Check shields
    for (const s of shields) {
      for (const p of s.pixels) {
        if (p.alive && Math.abs(s.x + p.x - b.x) < 3 && Math.abs(s.y + p.y - b.y) < 3) {
          damageShield(b.x, b.y, 4);
          playerBullets.splice(bi, 1);
          hit = true; break;
        }
      }
      if (hit) break;
    }
    if (hit) continue;
    // Check aliens
    for (const a of aliens) {
      if (!a.alive) continue;
      if (rectOverlap(b.x, b.y, BULLET_W, BULLET_H, a.x, a.y, ALIEN_W, ALIEN_H)) {
        a.alive = false; a.deathTimer = 1;
        playerBullets.splice(bi, 1);
        const pts = [10, 20, 30][a.type];
        combo++;
        const comboMult = Math.min(combo, 8);
        score += pts * comboMult;
        if (combo > maxCombo) maxCombo = combo;
        spawnParticles(a.x + ALIEN_W / 2, a.y + ALIEN_H / 2, ['#0f0', '#0ff', '#f0f'][a.type], 12, 2.5);
        sndExplosion();
        hit = true; break;
      }
    }
    if (hit) continue;
    // Check UFO
    if (ufo.active && rectOverlap(b.x, b.y, BULLET_W, BULLET_H, ufo.x - UFO_W / 2, 20, UFO_W, UFO_H)) {
      ufo.active = false;
      playerBullets.splice(bi, 1);
      ufo.points = [50, 100, 150, 200, 300][Math.floor(Math.random() * 5)];
      score += ufo.points;
      ufoScoreDisplay = { active: true, x: ufo.x, timer: 1.5, points: ufo.points };
      spawnParticles(ufo.x, 30, '#f0f', 20, 3);
      sndExplosion();
    }
  }

  // Aliens reaching bottom
  for (const a of aliens) {
    if (a.alive && a.y + ALIEN_H >= PLAYER_Y - 10) {
      state = 'gameover';
      sndGameOver();
      return;
    }
  }

  // UFO
  ufo.timer += dt;
  if (!ufo.active && ufo.timer > 15 + Math.random() * 10) {
    ufo.active = true; ufo.timer = 0;
    ufo.dir = Math.random() > 0.5 ? 1 : -1;
    ufo.x = ufo.dir > 0 ? -UFO_W : W + UFO_W;
  }
  if (ufo.active) {
    ufo.x += ufo.dir * 2;
    if (frameCount % 8 === 0) sndUfo();
    if (ufo.x > W + UFO_W * 2 || ufo.x < -UFO_W * 2) ufo.active = false;
  }
  if (ufoScoreDisplay.active) {
    ufoScoreDisplay.timer -= dt;
    if (ufoScoreDisplay.timer <= 0) ufoScoreDisplay.active = false;
  }

  // Player invincibility
  if (playerInvincible > 0) playerInvincible -= dt;

  // Screen shake
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    shakeX = (Math.random() - 0.5) * 8 * (shakeTimer / 0.3);
    shakeY = (Math.random() - 0.5) * 6 * (shakeTimer / 0.3);
  } else {
    shakeX = 0; shakeY = 0;
  }

  // Wave complete
  if (aliveCount === 0) {
    wave++;
    sndLevelComplete();
    state = 'intermission';
    intermissionTimer = 2.5;
    return;
  }

  // High score
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('si_hi', String(highScore));
  }
}

function playerHit() {
  lives--;
  sndPlayerDeath();
  shakeTimer = 0.4;
  spawnParticles(player.x, PLAYER_Y, '#0f0', 24, 4);
  spawnParticles(player.x, PLAYER_Y, '#ff0', 12, 3);
  if (lives <= 0) {
    state = 'gameover';
    sndGameOver();
  } else {
    playerInvincible = 2;
  }
  combo = 0;
}

// --- Drawing ---
function drawBullets() {
  // Player bullets
  ctx.shadowColor = '#ff0'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#ff0';
  for (const b of playerBullets) {
    ctx.fillRect(b.x, b.y, BULLET_W, BULLET_H);
  }
  // Alien bullets
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 8;
  for (const b of alienBullets) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - 1, b.y - 4, 3, 10);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(b.x, b.y - 2, 1, 6);
  }
  ctx.shadowBlur = 0;
}

function drawHUD() {
  ctx.save();
  ctx.shadowColor = '#0f0'; ctx.shadowBlur = 4;
  ctx.fillStyle = '#0f0';
  ctx.font = '18px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE ${String(score).padStart(6, '0')}`, 20, 24);
  ctx.textAlign = 'center';
  ctx.fillText(`HI ${String(highScore).padStart(6, '0')}`, W / 2, 24);
  ctx.textAlign = 'right';
  ctx.fillText(`WAVE ${wave}`, W - 20, 24);
  // Lives
  for (let i = 0; i < lives; i++) {
    drawPlayer(50 + i * 36, H - 14, false);
  }
  // Combo
  if (combo >= 3) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.font = '14px Courier New';
    ctx.fillText(`COMBO x${combo}`, W / 2, H - 10);
  }
  // UFO score
  if (ufoScoreDisplay.active) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f0f';
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 10;
    ctx.font = '16px Courier New';
    const alpha = Math.min(1, ufoScoreDisplay.timer * 2);
    ctx.globalAlpha = alpha;
    ctx.fillText(`${ufoScoreDisplay.points}`, ufoScoreDisplay.x, 30 - (1.5 - ufoScoreDisplay.timer) * 20);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawTitleScreen() {
  drawStars();
  ctx.save();
  // Title
  ctx.shadowColor = '#0f0'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#0f0';
  ctx.font = 'bold 52px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('SPACE INVADERS', W / 2, 140);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#888';
  ctx.font = '14px Courier New';
  ctx.fillText('MARSALA ARCADE EDITION', W / 2, 168);

  // Animated aliens as decoration
  const demoY = 220;
  const types = [0, 1, 2];
  const pts = ['= 10 PTS', '= 20 PTS', '= 30 PTS'];
  for (let i = 0; i < 3; i++) {
    const a = { x: W / 2 - 80, y: demoY + i * 50, type: types[i], alive: true, deathTimer: 0 };
    drawAlien(a, animFrame);
    ctx.fillStyle = '#ccc';
    ctx.font = '16px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(pts[i], W / 2 - 30, demoY + i * 50 + ALIEN_H / 2 + 4);
  }
  // Mystery
  ctx.save();
  ctx.shadowColor = '#f0f'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#d0d';
  ctx.font = '16px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('? = MYSTERY', W / 2 - 20, demoY + 160);
  ctx.restore();

  // Insert coin blink
  insertCoinBlink += dt;
  if (Math.sin(insertCoinBlink * 3) > 0) {
    ctx.shadowColor = '#ff0'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff0';
    ctx.font = '22px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('INSERT COIN', W / 2, 460);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa';
    ctx.font = '14px Courier New';
    ctx.fillText('PRESS SPACE OR TAP TO START', W / 2, 490);
  }

  // Controls
  ctx.fillStyle = '#555';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('ARROWS / WASD = MOVE    SPACE = FIRE    P = PAUSE', W / 2, 540);
  ctx.fillText('TOUCH: SWIPE OR BUTTONS = MOVE    TAP = FIRE', W / 2, 558);
  ctx.restore();

  // Attract mode alien animation
  attractTimer += dt;
  if (attractTimer > 0.5) { attractTimer = 0; animFrame = 1 - animFrame; }
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 42px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2 - 10);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aaa';
  ctx.font = '16px Courier New';
  ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.shadowColor = '#f00'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#f00';
  ctx.font = 'bold 48px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '20px Courier New';
  ctx.fillText(`FINAL SCORE: ${score}`, W / 2, H / 2 + 10);
  if (maxCombo >= 3) {
    ctx.fillStyle = '#ff0';
    ctx.fillText(`MAX COMBO: x${maxCombo}`, W / 2, H / 2 + 40);
  }
  ctx.fillStyle = '#aaa';
  ctx.font = '16px Courier New';
  if (Math.sin(frameCount * 0.05) > 0) {
    ctx.fillText('PRESS SPACE TO PLAY AGAIN', W / 2, H / 2 + 80);
  }
  ctx.restore();
}

function drawIntermission() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 40px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave}`, W / 2, H / 2 - 20);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#888';
  ctx.font = '16px Courier New';
  ctx.fillText('GET READY', W / 2, H / 2 + 20);
  ctx.restore();
}

// --- Main Loop ---
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  frameCount++;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Clear
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  drawStars();
  updateParticles();
  drawParticles();

  switch (state) {
    case 'title':
      drawTitleScreen();
      break;
    case 'playing':
      updatePlaying();
      // Draw game objects
      for (const a of aliens) drawAlien(a, animFrame);
      drawUfo();
      drawShields();
      drawBullets();
      drawPlayer(player.x, PLAYER_Y);
      drawHUD();
      break;
    case 'paused':
      for (const a of aliens) drawAlien(a, animFrame);
      drawUfo();
      drawShields();
      drawBullets();
      drawPlayer(player.x, PLAYER_Y);
      drawHUD();
      drawPauseScreen();
      break;
    case 'gameover':
      for (const a of aliens) drawAlien(a, animFrame);
      drawShields();
      drawHUD();
      drawGameOver();
      break;
    case 'intermission':
      drawHUD();
      drawIntermission();
      intermissionTimer -= dt;
      if (intermissionTimer <= 0) {
        startWave();
        state = 'playing';
      }
      break;
  }

  ctx.restore();
}

// --- Input Handlers ---
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
  initAudio();

  if (e.key === ' ') {
    if (state === 'title') { resetGame(); state = 'playing'; }
    else if (state === 'gameover') { resetGame(); state = 'playing'; }
  }
  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
const tlBtn = document.getElementById('touch-left');
const trBtn = document.getElementById('touch-right');
const tfBtn = document.getElementById('touch-fire');
function tstart(which, val) {
  return e => { e.preventDefault(); initAudio(); if (which === 'l') touchLeft = val; if (which === 'r') touchRight = val; if (which === 'f') touchFire = val; };
}
tlBtn.addEventListener('touchstart', tstart('l', true)); tlBtn.addEventListener('touchend', tstart('l', false));
tlBtn.addEventListener('touchcancel', tstart('l', false));
trBtn.addEventListener('touchstart', tstart('r', true)); trBtn.addEventListener('touchend', tstart('r', false));
trBtn.addEventListener('touchcancel', tstart('r', false));
tfBtn.addEventListener('touchstart', tstart('f', true)); tfBtn.addEventListener('touchend', tstart('f', false));
tfBtn.addEventListener('touchcancel', tstart('f', false));

// Swipe + tap on canvas
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  const t = e.touches[0];
  swipeStartX = t.clientX;
  swipeActive = true;
  if (state === 'title' || state === 'gameover') {
    if (state === 'title') { resetGame(); state = 'playing'; }
    else { resetGame(); state = 'playing'; }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!swipeActive) return;
  const t = e.touches[0];
  const dx = t.clientX - swipeStartX;
  if (Math.abs(dx) > 10) {
    touchLeft = dx < 0;
    touchRight = dx > 0;
    swipeStartX = t.clientX;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  swipeActive = false;
  touchLeft = false;
  touchRight = false;
  // Tap = fire
  if (state === 'playing') {
    touchFire = true;
    setTimeout(() => { touchFire = false; }, 100);
  }
});

// Prevent scrolling
document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// --- Initialize ---
initStars();
requestAnimationFrame(gameLoop);

})();
</script>
