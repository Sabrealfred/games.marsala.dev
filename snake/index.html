<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake — Marsala Games</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Courier New',monospace;background:#0a0a0a;color:#e8e6f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .header{width:100%;max-width:900px;padding:16px 20px 6px;display:flex;align-items:center;gap:16px;}
    .back-btn{color:#8a87a8;text-decoration:none;font-size:14px;}.back-btn:hover{color:#22c55e;}
    .header h1{font-size:24px;color:#22c55e;flex:1;}
    .hud{width:100%;max-width:900px;padding:4px 20px 8px;display:flex;justify-content:space-between;font-size:16px;}
    .hud .score{color:#22c55e;} .hud .high{color:#f59e0b;} .hud .speed{color:#a5b4fc;}
    .canvas-wrapper{width:100%;max-width:900px;padding:0 12px;}
    canvas{width:100%;height:auto;border:2px solid #1a3a2a;border-radius:8px;image-rendering:pixelated;display:block;background:#0a1a0f;}
    .mobile-controls{display:none;grid-template-columns:repeat(3,64px);gap:8px;margin-top:16px;}
    .mobile-controls button{width:64px;height:64px;background:#1f2937;border:1px solid #374151;border-radius:12px;color:#e5e7eb;font-size:26px;cursor:pointer;user-select:none;-webkit-user-select:none;}
    .mobile-controls button:active{background:#374151;}
    .footer-note{padding:16px;text-align:center;font-size:12px;color:#4b5563;max-width:900px;}
    .footer-note a{color:#6c63ff;text-decoration:none;}
    @media(max-width:600px){.mobile-controls{display:grid;}}
    @media(max-width:480px){.header h1{font-size:20px;}.hud{font-size:13px;}}
  </style>
</head>
<body>
  <div class="header">
    <a href="/" class="back-btn">← Back</a>
    <h1>SNAKE</h1>
  </div>
  <div class="hud">
    <span class="score" id="hud-score">SCORE: 0</span>
    <span class="high" id="hud-high">BEST: 0</span>
    <span class="speed" id="hud-speed">SPEED: 1</span>
  </div>
  <div class="canvas-wrapper">
    <canvas id="game" width="600" height="600"></canvas>
  </div>
  <div class="mobile-controls">
    <div></div>
    <button ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">▲</button>
    <div></div>
    <button ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">◀</button>
    <button ontouchstart="setDir(0,1)" onclick="setDir(0,1)">▼</button>
    <button ontouchstart="setDir(1,0)" onclick="setDir(1,0)">▶</button>
  </div>
  <div class="footer-note">
    Arrow keys or WASD to move. Eat food to grow. Don't hit the walls or yourself!
    <br><a href="/">← Marsala Games</a>
  </div>

<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const GRID=20,COLS=30,ROWS=30,W=COLS*GRID,H=ROWS*GRID;
canvas.width=W; canvas.height=H;

let snake,dir,nextDir,food,specialFood,score,highScore,speed,state,lastMove,growCount,particles,frame;

highScore=parseInt(localStorage.getItem('snake-high')||'0');

function init(){
  const mid=Math.floor(COLS/2);
  snake=[{x:mid,y:Math.floor(ROWS/2)},{x:mid-1,y:Math.floor(ROWS/2)},{x:mid-2,y:Math.floor(ROWS/2)}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; speed=1; growCount=0; frame=0;
  particles=[];
  state='ready';
  placeFood();
  specialFood=null;
  updateHUD();
}

function placeFood(){
  let fx,fy;
  do{ fx=Math.floor(Math.random()*COLS); fy=Math.floor(Math.random()*ROWS); }
  while(snake.some(s=>s.x===fx&&s.y===fy));
  food={x:fx,y:fy};
}

function placeSpecial(){
  let fx,fy;
  do{ fx=Math.floor(Math.random()*COLS); fy=Math.floor(Math.random()*ROWS); }
  while(snake.some(s=>s.x===fx&&s.y===fy)||(fx===food.x&&fy===food.y));
  specialFood={x:fx,y:fy,life:80};
}

function updateHUD(){
  document.getElementById('hud-score').textContent='SCORE: '+score;
  document.getElementById('hud-high').textContent='BEST: '+highScore;
  document.getElementById('hud-speed').textContent='SPEED: '+speed;
}

function addParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    particles.push({x:x*GRID+GRID/2,y:y*GRID+GRID/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20+Math.random()*10,color:color,r:2+Math.random()*3});
  }
}

function getInterval(){return Math.max(40,120-speed*8);}

function update(){
  if(state!=='playing') return;
  frame++;

  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // Wall collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){
    state='over';
    if(score>highScore){highScore=score;localStorage.setItem('snake-high',highScore);}
    addParticles(snake[0].x,snake[0].y,'#ef4444',20);
    updateHUD();
    return;
  }

  // Self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    state='over';
    if(score>highScore){highScore=score;localStorage.setItem('snake-high',highScore);}
    addParticles(snake[0].x,snake[0].y,'#ef4444',20);
    updateHUD();
    return;
  }

  snake.unshift(head);

  // Eat food
  if(head.x===food.x&&head.y===food.y){
    score+=10;
    growCount+=1;
    addParticles(food.x,food.y,'#22c55e',12);
    placeFood();
    if(score%50===0){ speed=Math.min(10,speed+1); }
    if(score%30===0&&!specialFood) placeSpecial();
  }
  // Eat special food
  else if(specialFood&&head.x===specialFood.x&&head.y===specialFood.y){
    score+=50;
    growCount+=2;
    addParticles(specialFood.x,specialFood.y,'#f59e0b',20);
    specialFood=null;
  }

  if(growCount>0) growCount--;
  else snake.pop();

  // Special food timer
  if(specialFood){specialFood.life--;if(specialFood.life<=0) specialFood=null;}

  updateHUD();
}

function render(){
  // Background
  ctx.fillStyle='#0a1a0f';
  ctx.fillRect(0,0,W,H);

  // Grid lines (subtle)
  ctx.strokeStyle='rgba(34,197,94,0.04)';
  ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*GRID,0);ctx.lineTo(x*GRID,H);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*GRID);ctx.lineTo(W,y*GRID);ctx.stroke();}

  // Snake
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    const t=1-i/snake.length;
    const r=Math.floor(34*t);
    const g=Math.floor(197+58*(1-t));
    const b=Math.floor(94*t);
    ctx.fillStyle=`rgb(${r},${g},${b})`;

    const pad=i===0?1:2;
    ctx.beginPath();
    ctx.roundRect(s.x*GRID+pad,s.y*GRID+pad,GRID-pad*2,GRID-pad*2,i===0?5:3);
    ctx.fill();

    // Head eyes
    if(i===0){
      ctx.fillStyle='#fff';
      const ex=dir.x===0?3:dir.x>0?4:1;
      const ey=dir.y===0?3:dir.y>0?4:1;
      ctx.beginPath();ctx.arc(s.x*GRID+GRID/2-3+ex,s.y*GRID+GRID/2-2+ey,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s.x*GRID+GRID/2+3+ex,s.y*GRID+GRID/2-2+ey,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(s.x*GRID+GRID/2-3+ex*1.3,s.y*GRID+GRID/2-2+ey*1.3,1.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s.x*GRID+GRID/2+3+ex*1.3,s.y*GRID+GRID/2-2+ey*1.3,1.2,0,Math.PI*2);ctx.fill();
    }
  }

  // Food
  const pulse=Math.sin(frame*0.15)*2;
  ctx.fillStyle='#ef4444';
  ctx.shadowColor='#ef4444';ctx.shadowBlur=8+pulse;
  ctx.beginPath();ctx.arc(food.x*GRID+GRID/2,food.y*GRID+GRID/2,GRID/2-3+pulse,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Special food
  if(specialFood){
    const sp=Math.sin(frame*0.2)*3;
    const alpha=specialFood.life/80;
    ctx.fillStyle=`rgba(245,158,11,${alpha})`;
    ctx.shadowColor='#f59e0b';ctx.shadowBlur=12+sp;
    ctx.beginPath();
    // Star shape
    const cx=specialFood.x*GRID+GRID/2,cy=specialFood.y*GRID+GRID/2;
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5-Math.PI/2+frame*0.05;
      const r1=GRID/2-2+sp,r2=GRID/4;
      ctx.lineTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
      ctx.lineTo(cx+Math.cos(a+Math.PI/5)*r2,cy+Math.sin(a+Math.PI/5)*r2);
    }
    ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.95;p.vy*=0.95;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/30),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Overlays
  if(state==='ready'){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#22c55e';ctx.font='bold 32px monospace';ctx.textAlign='center';
    ctx.fillText('SNAKE',W/2,H/2-30);
    ctx.fillStyle='#fbbf24';ctx.font='16px monospace';
    ctx.fillText('Press any key to start',W/2,H/2+10);
    ctx.fillStyle='#9ca3af';ctx.font='12px monospace';
    ctx.fillText('Arrow keys or WASD',W/2,H/2+35);
  }
  if(state==='over'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ef4444';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-20);
    ctx.fillStyle='#9ca3af';ctx.font='15px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+12);
    if(score>=highScore&&score>0){
      ctx.fillStyle='#f59e0b';ctx.fillText('NEW HIGH SCORE!',W/2,H/2+36);
    }
    ctx.fillStyle='#6b7280';ctx.font='13px monospace';
    ctx.fillText('Press any key to restart',W/2,H/2+60);
  }
}

// Game loop with variable speed
let lastUpdate=0;
function loop(time){
  if(state==='playing'){
    if(time-lastUpdate>=getInterval()){
      update();
      lastUpdate=time;
    }
  }
  frame++;
  render();
  requestAnimationFrame(loop);
}

// Input
window.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key)) e.preventDefault();
  if(state==='ready'){state='playing';lastUpdate=performance.now();return;}
  if(state==='over'){init();state='playing';lastUpdate=performance.now();return;}
  switch(e.key){
    case 'ArrowRight':case 'd': if(dir.x!== -1) nextDir={x:1,y:0}; break;
    case 'ArrowLeft':case 'a': if(dir.x!==1) nextDir={x:-1,y:0}; break;
    case 'ArrowDown':case 's': if(dir.y!== -1) nextDir={x:0,y:1}; break;
    case 'ArrowUp':case 'w': if(dir.y!==1) nextDir={x:0,y:-1}; break;
  }
});

window.setDir=function(dx,dy){
  if(state==='ready'){state='playing';lastUpdate=performance.now();return;}
  if(state==='over'){init();state='playing';lastUpdate=performance.now();return;}
  if(dx===1&&dir.x!==-1) nextDir={x:1,y:0};
  if(dx===-1&&dir.x!==1) nextDir={x:-1,y:0};
  if(dy===1&&dir.y!==-1) nextDir={x:0,y:1};
  if(dy===-1&&dir.y!==1) nextDir={x:0,y:-1};
};

// Swipe support
let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:-1,0);}
  else{setDir(0,dy>0?1:-1);}
},{passive:true});

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
